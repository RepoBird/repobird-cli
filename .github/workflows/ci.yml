name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Install Linux test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev

    - name: Run tests
      run: make test
      env:
        REPOBIRD_API_URL: http://localhost:3000
        XDG_CONFIG_HOME: /tmp/test-config

    - name: Run integration tests
      run: make test-integration
      env:
        REPOBIRD_API_URL: http://localhost:3000
        XDG_CONFIG_HOME: /tmp/test-config

    - name: Generate coverage report
      run: |
        make coverage
        go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          coverage.out
          coverage.html

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

    - name: Install Linux lint dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev

    - name: Run golangci-lint
      run: make lint

    - name: Check formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go files are not formatted:"
          gofmt -l .
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build binary
      run: make build

    - name: Test binary execution
      run: |
        ./build/repobird version
        ./build/repobird --help
      shell: bash

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: repobird-${{ matrix.os }}
        path: build/repobird*

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Run gosec security scanner
      uses: securego/gosec@master
      continue-on-error: true
      with:
        args: './...'

    - name: Run vulnerability check
      continue-on-error: true
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Check for uncommitted changes
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

    - name: Validate commit messages
      uses: wagoid/commitlint-github-action@v5
      with:
        configFile: .commitlintrc.yml
      continue-on-error: true
